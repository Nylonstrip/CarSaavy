<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CarSaavy – Vehicle Report Tool</title>

    <!-- Stripe -->
    <script src="https://js.stripe.com/v3/"></script>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d1b2a;
            padding: 0;
            margin: 0;
            color: #eee;
        }

        header {
            background: #0d1b2a;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #1b263b;
        }

        header img {
            height: 48px;
        }

        .container {
            max-width: 560px;
            margin: 40px auto;
            background: #1b263b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 5px;
            color: #fff;
            font-size: 28px;
        }

        .subtitle {
            font-size: 14px;
            color: #b8c1ec;
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #415a77;
            background: #0d1b2a;
            color: #eee;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #778da9;
        }

        input.valid { border-color: #00d924; }
        input.invalid { border-color: #ff4444; }

        .message {
            margin-top: 10px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .success { background: #144d25; color: #8effa1; }
        .error { background: #5c2b2e; color: #ffb3b3; }

        button {
            width: 100%;
            padding: 14px;
            background: #415a77;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover:not(:disabled) { background: #527bbd; }
        button:disabled { background: #2e3b55; cursor: not-allowed; }

        .step { display: none; animation: fade 0.3s ease; }
        .step.active { display: block; }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .vin-display {
            background: #0d1b2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 18px;
            letter-spacing: 2px;
            font-weight: 600;
            color: #e0e0e0;
        }

        #card-element {
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #415a77;
        }

        #card-errors {
            color: #ff7b7b;
            margin-top: 8px;
        }

        .price-display {
            background: #0d1b2a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #415a77;
            margin-bottom: 20px;
        }

        .price-amount {
            font-size: 32px;
            font-weight: 700;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>
<header>
    <a href="/"><img src="/carsaavy_header.webp" alt="CarSaavy Logo"></a>
    <span style="color:#eee; font-size:14px;">Vehicle Report Tool</span>
</header>

<div class="container">

    <h1>Car Buying Audit Report</h1>
    <p class="subtitle">Get instant insights & negotiate like a pro</p>

    <!-- STEP 1 -->
    <div id="step1" class="step active">
        <form id="vinForm">
            <div class="form-group">
                <label>Vehicle Identification Number (VIN):</label>
                <input id="vin" maxlength="17" placeholder="Enter 17-character VIN" />
                <div id="validationMessage"></div>
            </div>
            <button type="submit">Continue to Payment</button>
        </form>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="step">
        <div class="vin-display" id="vinDisplay"></div>
        <div class="price-display">
            <div class="price-amount">$20.00</div>
            <p>Email delivery + full PDF report</p>
        </div>

        <form id="payment-form">
            <div class="form-group">
                <label>Email Address:</label>
                <input id="email" type="email" placeholder="you@example.com" required />
            </div>

            <label>Card Details:</label>
            <div id="card-element"></div>
            <div id="card-errors"></div>

            <button id="paymentSubmitBtn">Pay $20.00</button>
            <button type="button" onclick="goToStep(1)" style="background:#1b263b;border:2px solid #415a77;margin-top:10px;">
                ← Back
            </button>
        </form>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="step">
        <div style="text-align:center;padding:30px 10px;">
            <div style="font-size:60px;">✅</div>
            <h2>Payment Successful</h2>
            <p>Your report is being generated…</p>

            <div class="vin-display" id="finalVinDisplay"></div>
            <p>Email sent to <strong id="emailConfirm"></strong></p>

            <button onclick="location.reload()">Generate Another Report</button>
        </div>
    </div>

</div>

<script>
    const stripe = Stripe("pk_test_51SEAELB3RPy2OIjKKbueCTkdO97ipd7PHoQlDT9Z9Fi1GdWRHKFmZ5zHLGBBb08VxF6zUU60sli9LpqS4r0lJm5t00tHIX2I44");

    const elements = stripe.elements();
    const cardElement = elements.create("card", {
        style: {
            base: { color:"#eee", fontSize:"16px", "::placeholder":{ color:"#777" }},
            invalid:{ color:"#ff7b7b" }
        }
    });

    function goToStep(step) {
        document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
        document.getElementById("step" + step).classList.add("active");

        if (step === 2 && !cardElement._mounted) {
            cardElement.mount("#card-element");
            cardElement._mounted = true;
        }
    }

    function validateVIN(v) {
        if (v.length !== 17) return "VIN must be exactly 17 characters.";
        if (!/^[A-HJ-NPR-Z0-9]{17}$/i.test(v)) return "VIN contains invalid characters.";
        return null;
    }

    const vinInput = document.getElementById("vin");
    const vinForm = document.getElementById("vinForm");
    const validationMessage = document.getElementById("validationMessage");

    let currentVIN = "";

    vinForm.addEventListener("submit", e => {
        e.preventDefault();
        const vin = vinInput.value.toUpperCase();
        const error = validateVIN(vin);

        if (error) {
            validationMessage.innerHTML = `<div class="message error">${error}</div>`;
            return;
        }

        currentVIN = vin;
        document.getElementById("vinDisplay").textContent = vin;
        document.getElementById("finalVinDisplay").textContent = vin;
        validationMessage.innerHTML = "";
        goToStep(2);
    });

    const paymentForm = document.getElementById("payment-form");
    paymentForm.addEventListener("submit", async e => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const btn = document.getElementById("paymentSubmitBtn");
        const cardErrors = document.getElementById("card-errors");

        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div>Processing...`;

        try {
            const res = await fetch("/api/create-payment", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ vin: currentVIN, email })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error);

            const { error, paymentIntent } = await stripe.confirmCardPayment(data.clientSecret, {
                payment_method: { card: cardElement, billing_details:{ email } }
            });

            if (error) throw new Error(error.message);

            document.getElementById("emailConfirm").textContent = email;
            goToStep(3);

        } catch (err) {
            cardErrors.textContent = err.message;
            btn.disabled = false;
            btn.textContent = "Pay $20.00";
        }
    });
</script>

</body>
</html>
