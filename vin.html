<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarSaavy VIN Report</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #e5e5e5;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: #111;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 200, 255, 0.15);
      animation: fadeIn 0.6s ease;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00c8ff;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .logo {
      width: 180px;
      display: block;
      margin: 0 auto 20px auto;
    }

    label {
      display: block;
      margin: 18px 0 6px;
      font-size: 15px;
      color: #00c8ff;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: white;
      font-size: 16px;
      transition: 0.2s;
    }

    input:focus {
      border-color: #00c8ff;
      box-shadow: 0 0 6px rgba(0, 200, 255, 0.4);
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #00c8ff;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #00e0ff;
    }

    #step2, #step3 {
      display: none;
      margin-top: 30px;
      animation: fadeIn 0.5s ease;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
      font-size: 16px;
      color: #bbb;
    }

    .error-msg {
      color: #ff6b6b;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="/carsaavy_header.webp" class="logo">

    <h1>Generate Your Report</h1>

    <!-- Step 1: VIN + Email -->
    <div id="step1">
      <label for="vin">Enter VIN</label>
      <input type="text" id="vin" placeholder="e.g. 1HGCM82633A004352" maxlength="17">

      <label for="email">Your Email</label>
      <input type="email" id="email" placeholder="you@example.com">

      <div id="error-step1" class="error-msg"></div>

      <button onclick="continueToPayment()">Continue</button>
    </div>

    <!-- Step 2: Payment -->
    <div id="step2">
      <h2>Payment</h2>
      <p>You're almost there! Complete payment to generate your negotiation report.</p>

      <button id="payBtn" onclick="createPayment()">Pay $20</button>

      <div id="error-step2" class="error-msg"></div>
    </div>

    <!-- Step 3: Loading -->
    <div id="step3">
      <h2>Generating Report…</h2>
      <p class="loading">This usually takes 3–8 seconds.</p>
    </div>

  </div>

<script>
function validateVIN(vin) {
  return /^[A-HJ-NPR-Z0-9]{17}$/i.test(vin);
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function continueToPayment() {
  const vin = document.getElementById("vin").value.trim();
  const email = document.getElementById("email").value.trim();
  const errorBox = document.getElementById("error-step1");

  errorBox.style.display = "none";

  if (!validateVIN(vin)) {
    errorBox.innerText = "Please enter a valid 17-character VIN.";
    errorBox.style.display = "block";
    return;
  }

  if (!validateEmail(email)) {
    errorBox.innerText = "Please enter a valid email address.";
    errorBox.style.display = "block";
    return;
  }

  // transition
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

async function createPayment() {
  const vin = document.getElementById("vin").value.trim();
  const email = document.getElementById("email").value.trim();
  const errorBox = document.getElementById("error-step2");

  errorBox.style.display = "none";

  try {
    const res = await fetch("/api/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ vin, email })
    });

    const data = await res.json();
    if (!res.ok || !data.clientSecret) {
      throw new Error(data.error || "Payment setup failed.");
    }

    // transition
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "block";

    const stripe = Stripe(data.publicKey);
    await stripe.confirmCardPayment(data.clientSecret);

  } catch (err) {
    errorBox.innerText = err.message;
    errorBox.style.display = "block";
  }
}
</script>

</body>
</html>
