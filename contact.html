<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – CarSaavy</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    :root{
    --bg:#0b0f13;
    --card:#121417;
    --muted:#9aa6b2;
    --accent1:#0077b6;
    --accent2:#00b4d8;
    --glass: rgba(255,255,255,0.03);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    background:#121212;
    color:#e6eef6;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    display:flex;flex-direction:column;min-height:100vh;
  }

  /* Header */
  header.site-header{
    position:sticky;top:0;z-index:50;
    backdrop-filter: blur(6px);
    background: linear-gradient(180deg, rgba(10,12,14,0.6), rgba(10,12,14,0.4));
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand img{height:44px;display:block}
  nav.site-nav{display:flex;gap:14px;align-items:center}
  nav.site-nav a{
    color:var(--muted);text-decoration:none;font-weight:600;padding:8px 12px;border-radius:10px;
    transition: all .18s ease;
  }
  nav.site-nav a:hover{color:#fff;background:linear-gradient(90deg,var(--accent1),var(--accent2));box-shadow:0 6px 18px rgba(0,180,216,0.12);transform:translateY(-2px);}

    .container {
      max-width: 800px;
      margin: 60px auto;
      background: #161b22;
      padding: 40px;
      border-radius: 10px;
      border: 1px solid #1f2937;
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 8px;
      font-size: 15px;
      color: #cbd5e1;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      background: #0f141a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: white;
    }

    button {
      margin-top: 25px;
      width: 100%;
      background: #00b4d8;
      color: black;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      background: #0093b3;
    }

    /* Fade-in success box */
    #successBox {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: white;
      padding: 20px 30px;
      border-radius: 8px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      font-size: 18px;
      opacity: 0;
      transition: all 0.6s ease;
      z-index: 9999;
    }

    #successBox.show {
      top: 40px;
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #1b1b1b;
      color: #9ed9ef;
    }

    /* Responsive */
  @media (max-width:900px){
    .hero{grid-template-columns:1fr; padding-bottom:20px}
    nav.site-nav{display:none}
  }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="brand">
      <a href="/"><img src="/images/carsaavy_header.webp" alt="CarSaavy logo" /></a>
    </div>

    <nav class="site-nav" aria-label="Main nav">
      <a href="/index">Home</a>
      <a href="/vin">VIN Tool</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
      <a href="/privacy">Privacy</a>
    </nav>
  </header>

<div id="successBox">Message Sent Successfully 🎉</div>

<div class="container">
  <h1>Contact Us</h1>

  <form id="contactForm">
    <label>Your Name</label>
    <input type="text" id="name" required>

    <label>Your Email</label>
    <input type="email" id="email" required>

    <label>Your Message</label>
    <textarea id="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>

<footer>
  © 2025 CarSaavy — Negotiate Smarter • <a href="/privacy" style="color:var(--muted);text-decoration:underline">Privacy</a>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    message: document.getElementById("message").value.trim(),
  };

  const res = await fetch("/api/contact", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (res.ok) {
    const box = document.getElementById("successBox");
    box.classList.add("show");
    setTimeout(() => box.classList.remove("show"), 3500);

    document.getElementById("contactForm").reset();
  } else {
    alert("Error sending message. Please try again.");
  }
});
</script>

</body>
</html>
